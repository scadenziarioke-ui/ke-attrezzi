services:
  - type: web
    name: ke-attrezzi
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ke-attrezzi-db
          property: connectionString
      - key: LOGIN_USERNAME
        value: admin
      - key: LOGIN_PASSWORD
        generateValue: true
      - key: FLASK_SECRET
        generateValue: true

databases:
  - name: ke-attrezzi-db
    databaseName: ke_attrezzi
    user: ke_attrezzi
